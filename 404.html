<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Not found — Monavi</title>
    <meta name="theme-color" content="#f7f3ec" />
    <link rel="icon" href="assets/monavi-mark.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;450;500;600;700;800&family=Geist+Mono:wght@450;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .not-found {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .not-found-card {
        width: min(720px, 100%);
        padding: clamp(32px, 6vw, 64px);
        border: 1px solid rgba(18, 18, 15, 0.12);
        border-radius: 38px;
        background: rgba(255, 251, 244, 0.8);
        box-shadow: 0 26px 80px rgba(56, 44, 26, 0.13);
      }

      .not-found-card h1 {
        margin-bottom: 18px;
        font-size: clamp(4rem, 14vw, 8rem);
      }

      .not-found-card p {
        color: var(--muted);
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <main class="not-found">
      <section class="not-found-card">
        <p class="eyebrow"><span class="status-dot"></span>Page not found</p>
        <h1>404</h1>
        <p>The page you are looking for does not exist on the Monavi site.</p>
        <div class="hero-actions">
          <a class="button button-primary" href="/">Back home</a>
          <a class="button button-secondary" href="mailto:monavidev@hotmail.com">Contact</a>
        </div>
      </section>
    </main>
  </body>
</html>
